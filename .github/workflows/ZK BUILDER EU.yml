
name: ZK BUILDER EU

on:
  workflow_dispatch:
    inputs:
      URL:
        description: "XIAOMI.EU ROM URL"
        required: true
      SERVER:
        description: "SOURCEFORGE SERVER"
        default: '?use_mirror=cfhcalbe'
      URL2:
        description: "MIUI14 OTA URL"
      EXT4:
        description: "FORCE EXT4"
        type: boolean
        default: 'false'
      DECRYPT:
        description: "DECRYPT DATA"
        type: boolean
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2

      - name: Check free disk space
        id: diskcheck
        run: |
          FREE_GB=$(df -BG / | awk 'NR==2 {gsub("G","",$4); print $4}')
          echo "Free disk space: ${FREE_GB}GB"
          if [ "$FREE_GB" -lt 50 ]; then
            echo "need_cleanup=true" >> $GITHUB_OUTPUT
          else
            echo "need_cleanup=false" >> $GITHUB_OUTPUT
          fi

      - name: Maximize build disk space
        if: steps.diskcheck.outputs.need_cleanup == 'true'
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'

      - name: Setup build environment
        run: |
          cd "$GITHUB_WORKSPACE"
          sudo timedatectl set-timezone UTC
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y python3 python-is-python3 p7zip-full openjdk-17-jdk-headless openssh-client pipx > /dev/null 2>&1
          DATE=$(TZ=Asia/Ho_Chi_Minh date +"%y%m%d")
          ROM_URL="${{ github.event.inputs.URL }}"
          ROM_NAME="$(basename "${ROM_URL%/download}")"
          if [[ "$ROM_NAME" == *_OS* ]]; then
            if [[ "$ROM_NAME" =~ ^xiaomi\.eu_([^_]+)_(OS[0-9.]+)\.([A-Z0-9]+)_([0-9]+)\.zip$ ]]; then
              DEVICE_RAW="${BASH_REMATCH[1]}"
              DEVICE="${DEVICE_RAW^^}"
              OS_VER="${BASH_REMATCH[2]}"
              REGION="${BASH_REMATCH[3]}"
              export ZK_NAME="ZKOS_V1.9_${DEVICE}_${OS_VER}.${REGION}_${DATE}"
            else
              export ZK_NAME="ZKOS_V1.9_${DATE}"
            fi
          elif [[ "$ROM_NAME" == *_V14* ]]; then
            if [[ "$ROM_NAME" =~ ^xiaomi\.eu_multi_([A-Za-z0-9]+(_[A-Za-z0-9]+)?)_(V14\.[0-9.]+)\.([A-Z0-9]+)_v14-([0-9]+)\.zip$ ]]; then
              DEVICE_RAW="${BASH_REMATCH[1]}"
              DEVICE="${DEVICE_RAW^^}"
              OS_VER="${BASH_REMATCH[3]}"
              REGION="${BASH_REMATCH[4]}"
              export ZK_NAME="ZKUI_V1.5_${DEVICE}_${OS_VER}.${REGION}_${DATE}"
            else
              export ZK_NAME="ZKUI_V1.5_${DATE}_T"
            fi
          else
            echo "Unable to set ZK ROM name"
            exit 1
          fi
          echo "$ZK_NAME"
          echo "ZK_NAME=$ZK_NAME" >> $GITHUB_ENV
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV

      - name: Download ROM files
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE/ROM" && cd "$GITHUB_WORKSPACE/ROM"
          timeout 9000 wget -c --progress=dot:giga -O "${ZK_NAME}.zip" "${{ github.event.inputs.URL }}""${{ github.event.inputs.SF_SER }}" || exit 1
          if [[ "$ZK_NAME" == *_V14* ]] && [ -n "${{ github.event.inputs.URL2 }}" ]; then
            pipx install git+https://github.com/5ec1cff/payload-dumper
            mkdir -p AVB_PATCH && cd AVB_PATCH
            ~/.local/bin/payload_dumper --partitions "vendor_boot,vbmeta,vbmeta_system,vbmeta_vendor" "${{ github.event.inputs.URL2 }}" || exit 1
          fi

      - name: Clone ZK AUTO BUILD sources
        run: |
          cd "$GITHUB_WORKSPACE"
          export ZK_HOME="/home/runner/work/ZK_AUTO_BUILD/ZK_AUTO_BUILD"
          echo "ZK_HOME=$ZK_HOME" >> $GITHUB_ENV
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone -b eu --depth=1 git@github.com:zuri1503/ZK_AUTO_BUILD.git "$ZK_HOME"
          mkdir -p "$ZK_HOME/ROM"
          mv -f "$GITHUB_WORKSPACE/ROM" "$ZK_HOME/ROM"
          sudo chmod -R +x "$ZK_HOME"

      - name: Build ProjectZK ROM
        run: |
          cd "$ZK_HOME"
          sudo bash "$ZK_HOME/build.sh" "$GITHUB_ENV" "$ZK_HOME" "$ZK_NAME" "${{ github.event.inputs.EXT4 }}" "${{ github.event.inputs.DECRYPT }}" "$DEVICE"

      - name: Upload ROM to Clouds
        run: |
          cd "$ZK_HOME"
          upload_file() {
            local ROM_OUTPUT="$1"
            local PATH="$2"
            echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/sf_key
            chmod 600 ~/.ssh/sf_key
            rsync -av --partial -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" "$ROM_OUTPUT" \
            "zuri1503@frs.sourceforge.net:/home/frs/project/projectzk/ProjectZK/$PATH/" || exit 1
            echo "Uploaded $1"
          }
          if [ "$ROM_VER" = "V14" ]; then
            upload_file "$ROM_OUTPUT" "ZK-EU/ZKUI14.0" > /dev/null 2>&1 
          elif [ "$ROM_VER" = "OS2" ]; then
            upload_file "$ROM_OUTPUT" "ZK-EU/ZKOS2.2" > /dev/null 2>&1
          elif [ "$ROM_VER" = "OS3" ] || [ "$ROM_VER" = "OS3_A15" ]; then
            upload_file "$ROM_OUTPUT" "ZK-EU/ZKOS3.0" > /dev/null 2>&1
          fi
          sudo rm -rf "$GITHUB_WORKSPACE"/* "$ZK_HOME"/*
